name: Daily Podcast

on:
  schedule:
    - cron: "0 3 * * *"  # 5:00 Polska (UTC+2 / UTC+1)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run generator
        run: python main.py

      - name: Upload podcast
        uses: actions/upload-artifact@v4
        with:
          name: podcast
          path: podcast.mp3
